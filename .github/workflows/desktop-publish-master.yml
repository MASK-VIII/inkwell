# Build Windows NSIS and publish GitHub Release v{package.json version}.
# Manual only — run from Actions when you intentionally ship a desktop build.
#
# Optional: VERCEL_DEPLOY_HOOK_URL — POST after upload so Production fetches the new .exe.
name: Publish desktop installer

on:
  workflow_dispatch:

concurrency:
  group: desktop-publish
  cancel-in-progress: true

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  publish-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'installer=Inkwell-Setup-%s.exe\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build desktop (NSIS)
        shell: bash
        run: npm run build:desktop

      - name: Verify NSIS installer exists
        shell: bash
        run: |
          F="release/${{ steps.pkg.outputs.installer }}"
          if [ ! -f "$F" ]; then
            echo "::error::Missing $F — listing release/:"
            ls -la release/ || true
            exit 1
          fi
          ls -la "$F"

      - name: Verify electron-updater metadata (latest.yml)
        shell: bash
        run: |
          if [ ! -f release/latest.yml ]; then
            echo "::error::Missing release/latest.yml — electron-updater needs this on the GitHub release."
            ls -la release/ || true
            exit 1
          fi
          echo "--- latest.yml ---"
          cat release/latest.yml

      - name: Create or update GitHub Release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          TAG="v${VERSION}"
          FILE="release/${{ steps.pkg.outputs.installer }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading installer (--clobber)"
            gh release upload "$TAG" "$FILE" --clobber
          else
            echo "Creating release $TAG with installer"
            gh release create "$TAG" "$FILE" \
              --title "Inkwell ${VERSION}" \
              --generate-notes \
              --latest
          fi
          gh release upload "$TAG" release/latest.yml --clobber
          shopt -s nullglob
          for f in release/*.blockmap; do
            gh release upload "$TAG" "$f" --clobber
          done

      - name: Trigger Vercel production deploy (optional)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "No VERCEL_DEPLOY_HOOK_URL secret; skipping deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook invoked."
