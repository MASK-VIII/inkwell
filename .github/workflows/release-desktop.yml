# Publish Windows NSIS installer to GitHub Releases (Latest) for marketing "Download app".
# Requires: repo Settings → Actions → General → Workflow permissions → Read and write.
name: Release desktop (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  publish-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json (tag pushes only)
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          PKG_VER="${{ steps.pkg.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          TAG_VER="${TAG#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::Git tag '$TAG' (semver $TAG_VER) must equal package.json version '$PKG_VER'"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Vite inlines VITE_* at build time; without these, shipped installers show only offline Welcome (no email login).
      - name: Verify Supabase build secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        shell: bash
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::Add repository secret VITE_SUPABASE_URL (same value as .env.local for the web app)."
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ] && [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Add VITE_SUPABASE_PUBLISHABLE_KEY or VITE_SUPABASE_ANON_KEY (same as .env.local)."
            exit 1
          fi

      - name: Build desktop (NSIS)
        env:
          VITE_INKWELL_CLOUD_SYNC: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        shell: bash
        run: npm run build:desktop

      - name: Verify renderer bundle inlined Supabase env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        shell: bash
        run: node scripts/verify-desktop-renderer-inlined-supabase.mjs

      - name: Verify NSIS installer exists
        shell: bash
        run: |
          F="release/Inkwell Setup ${{ steps.pkg.outputs.version }}.exe"
          if [ ! -f "$F" ]; then
            echo "::error::Missing $F — listing release/:"
            ls -la release/ || true
            exit 1
          fi
          ls -la "$F"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Inkwell ${{ steps.pkg.outputs.version }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/Inkwell Setup ${{ steps.pkg.outputs.version }}.exe
