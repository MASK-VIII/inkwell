# Unsigned desktop installers for smoke testing (Windows + macOS).
# Manual only — does not run on every push/PR.
# For shipping installers, use "Publish desktop installer" or "Release desktop (Windows)".
name: Desktop build

on:
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        shell: bash
        run: npm run build:desktop

      - name: Verify latest.yml (Windows NSIS + GitHub publish config)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f release/latest.yml ]; then
            echo "::error::Missing release/latest.yml — electron-updater needs this for Windows auto-update."
            ls -la release/ || true
            exit 1
          fi
          cat release/latest.yml

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkwell-desktop-${{ matrix.os }}
          path: release/*
